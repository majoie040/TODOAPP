<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>OPUS — Task Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Geist+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#0a0a0a;--ink2:#1a1a1a;--ink3:#2e2e2e;--ink4:#444;
      --mid:#888;--light:#bbb;--rule:#e8e8e8;--rule2:#f0f0f0;
      --paper:#fafafa;--paper2:#fff;--paper3:#f5f5f5;
      --gold:#c9a84c;--gold-d:rgba(201,168,76,0.1);--gold-d2:rgba(201,168,76,0.18);
      --red:#c0392b;--red-d:rgba(192,57,43,0.08);
      --green:#2d6a4f;--green-d:rgba(45,106,79,0.08);
      --r:6px;--r2:10px;--r3:16px;
      --serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;--mono:'Geist Mono',monospace;
      --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
      --shadow2:0 2px 8px rgba(0,0,0,0.08),0 8px 32px rgba(0,0,0,0.06);
    }
    html{font-size:14px}
    body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;line-height:1.5}
    body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    .shell{display:flex;height:100vh;overflow:hidden}

    /* ── Sidebar ── */
    .sidebar{width:220px;flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;padding:2rem 0;overflow-y:auto}
    .logo{padding:0 1.5rem 2rem;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:1.5rem}
    .logo-word{font-family:var(--serif);font-size:1.6rem;font-weight:300;letter-spacing:0.2em;color:#fff;text-transform:uppercase}
    .logo-sub{font-size:0.6rem;font-family:var(--mono);color:rgba(255,255,255,0.25);letter-spacing:0.15em;text-transform:uppercase;margin-top:2px}
    .nav-group{padding:0 0.75rem;margin-bottom:1.5rem}
    .nav-label{font-size:0.58rem;font-family:var(--mono);color:rgba(255,255,255,0.22);letter-spacing:0.16em;text-transform:uppercase;padding:0 0.75rem;margin-bottom:0.5rem}
    .nav-item{display:flex;align-items:center;gap:10px;padding:0.55rem 0.75rem;border-radius:var(--r);color:rgba(255,255,255,0.45);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:var(--sans);font-size:0.82rem;font-weight:300;transition:all 0.15s;position:relative;letter-spacing:0.01em}
    .nav-item:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.05)}
    .nav-item.active{color:#fff;background:rgba(255,255,255,0.08)}
    .nav-item.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:2px;background:var(--gold);border-radius:2px}
    .nav-num{margin-left:auto;font-size:0.65rem;font-family:var(--mono);color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);padding:1px 7px;border-radius:20px}
    .nav-item.active .nav-num{color:var(--gold);background:rgba(201,168,76,0.15)}
    .proj-swatch{width:6px;height:6px;border-radius:50%;flex-shrink:0}

    /* Streak pill in sidebar */
    .streak-pill{
      margin:0 0.75rem 1.25rem;
      background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);
      border-radius:var(--r2);padding:0.7rem 0.85rem;
      display:flex;align-items:center;gap:10px;
    }
    .streak-flame{font-size:1.2rem;line-height:1}
    .streak-info{}
    .streak-num{font-family:var(--serif);font-size:1.3rem;font-weight:400;color:var(--gold);line-height:1}
    .streak-lbl{font-size:0.6rem;font-family:var(--mono);color:rgba(255,255,255,0.3);letter-spacing:0.1em;text-transform:uppercase}
    .streak-days{display:flex;gap:3px;margin-top:0.5rem}
    .sd{width:12px;height:12px;border-radius:2px;background:rgba(255,255,255,0.07)}
    .sd.done{background:var(--gold)}
    .sd.today{background:var(--gold);box-shadow:0 0 6px rgba(201,168,76,0.5)}

    .sidebar-bottom{margin-top:auto;padding:1.5rem 1.5rem 0;border-top:1px solid rgba(255,255,255,0.07)}
    .user-row{display:flex;align-items:center;gap:10px}
    .avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-family:var(--mono);color:#fff;flex-shrink:0}
    .user-info .uname{font-size:0.8rem;color:rgba(255,255,255,0.7);font-weight:400}
    .user-info .uplan{font-size:0.62rem;color:rgba(201,168,76,0.7);font-family:var(--mono);letter-spacing:0.05em}

    /* ── Main ── */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--paper2)}

    /* ── Header ── */
    .header{background:var(--paper2);border-bottom:1px solid var(--rule);padding:0 2rem;height:56px;display:flex;align-items:center;gap:1rem;flex-shrink:0}
    .page-title{font-family:var(--serif);font-size:1.4rem;font-weight:400;letter-spacing:0.02em;color:var(--ink);font-style:italic;white-space:nowrap}
    .divider-v{width:1px;height:20px;background:var(--rule);flex-shrink:0}
    .search-wrap{position:relative;flex:1;max-width:280px}
    .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--light);pointer-events:none}
    .search{width:100%;padding:0.45rem 0.75rem 0.45rem 2rem;background:var(--paper3);border:1px solid var(--rule);border-radius:var(--r);color:var(--ink);font-family:var(--sans);font-size:0.82rem;outline:none;transition:border 0.15s,background 0.15s}
    .search:focus{border-color:var(--ink3);background:var(--paper2)}
    .search::placeholder{color:var(--light)}
    .header-gap{flex:1}
    .hbtn{display:flex;align-items:center;gap:6px;padding:0.4rem 0.85rem;border-radius:var(--r);border:1px solid var(--rule);background:none;color:var(--mid);font-family:var(--sans);font-size:0.78rem;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-weight:400}
    .hbtn:hover{border-color:var(--ink4);color:var(--ink);background:var(--paper3)}
    .hbtn.cta{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:500}
    .hbtn.cta:hover{background:var(--ink2);border-color:var(--ink2)}
    .hbtn.gold{border-color:var(--gold);color:var(--gold)}
    .hbtn.gold:hover{background:var(--gold-d)}

    /* ── Body ── */
    .body{flex:1;overflow-y:auto;display:flex;flex-direction:column}

    /* ── Stats bar ── */
    .stats-bar{display:flex;align-items:stretch;border-bottom:1px solid var(--rule);flex-shrink:0}
    .stat-cell{flex:1;padding:1.1rem 1.5rem;border-right:1px solid var(--rule);display:flex;flex-direction:column;gap:0.3rem;transition:background 0.15s;cursor:default}
    .stat-cell:last-child{border-right:none}
    .stat-cell:hover{background:var(--paper3)}
    .s-num{font-family:var(--serif);font-size:1.9rem;font-weight:400;line-height:1;color:var(--ink);letter-spacing:-0.02em}
    .s-num.gold{color:var(--gold)}
    .s-num.green{color:var(--green)}
    .s-label{font-size:0.62rem;font-family:var(--mono);color:var(--light);letter-spacing:0.1em;text-transform:uppercase}
    .s-bar{height:2px;background:var(--rule2);border-radius:2px;margin-top:0.4rem;overflow:hidden}
    .s-fill{height:100%;border-radius:2px;transition:width 0.7s ease}

    /* ── Content grid ── */
    .content-grid{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden}
    .task-panel{overflow-y:auto;padding:1.75rem 2rem;border-right:1px solid var(--rule)}
    .side-panel{overflow-y:auto;padding:1.5rem;background:var(--paper);display:flex;flex-direction:column;gap:1.25rem}

    /* ── Add form ── */
    .add-form{background:var(--paper2);border:1px solid var(--rule);border-radius:var(--r2);padding:1.25rem 1.5rem 1rem;margin-bottom:1.5rem;box-shadow:var(--shadow);animation:dropIn 0.18s ease}
    @keyframes dropIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .form-hed{font-family:var(--serif);font-size:1.1rem;font-weight:400;font-style:italic;color:var(--ink);margin-bottom:1rem;letter-spacing:0.02em}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.6rem}
    .finp{width:100%;padding:0.5rem 0.7rem;background:var(--paper3);border:1px solid var(--rule);border-radius:var(--r);color:var(--ink);font-family:var(--sans);font-size:0.83rem;outline:none;transition:border 0.15s,background 0.15s}
    .finp:focus{border-color:var(--ink3);background:var(--paper2)}
    .finp::placeholder{color:var(--light)}
    select.finp{cursor:pointer}
    .finp.span2{grid-column:1/-1}
    .form-foot{display:flex;justify-content:flex-end;gap:0.5rem;margin-top:0.85rem;padding-top:0.85rem;border-top:1px solid var(--rule2)}

    /* ── Filter chips ── */
    .chip-row{display:flex;gap:0.35rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .chip{font-size:0.72rem;font-family:var(--mono);padding:4px 12px;border-radius:20px;border:1px solid var(--rule);background:none;color:var(--mid);cursor:pointer;transition:all 0.15s;letter-spacing:0.02em}
    .chip:hover{border-color:var(--ink4);color:var(--ink)}
    .chip.on{border-color:var(--ink);background:var(--ink);color:#fff}

    /* ── Section ── */
    .sec-head{display:flex;align-items:center;gap:1rem;margin-bottom:0.85rem}
    .sec-title{font-family:var(--serif);font-size:1rem;font-weight:400;font-style:italic;color:var(--ink4);white-space:nowrap}
    .sec-rule{flex:1;height:1px;background:var(--rule)}
    .sec-count{font-size:0.65rem;font-family:var(--mono);color:var(--light)}

    /* ── Task list ── */
    .t-list{display:flex;flex-direction:column;margin-bottom:2rem}
    .t-row{display:flex;align-items:flex-start;gap:0.85rem;padding:0.85rem 0;border-bottom:1px solid var(--rule2);transition:background 0.12s,padding 0.12s;position:relative}
    .t-row:first-child{border-top:1px solid var(--rule2)}
    .t-row:hover{background:var(--paper3);margin:0 -1rem;padding-left:1rem;padding-right:1rem;border-radius:var(--r)}
    .t-row.done-row .t-title{text-decoration:line-through;color:var(--light)}
    .t-row.done-row{opacity:0.55}
    .pri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;transition:transform 0.15s}
    .t-row:hover .pri-dot{transform:scale(1.4)}
    .pd-high{background:var(--red)}.pd-med{background:var(--gold)}.pd-low{background:var(--green)}
    .t-check{width:18px;height:18px;border-radius:50%;border:1px solid var(--rule);background:none;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
    .t-check:hover{border-color:var(--ink3)}
    .done-row .t-check{background:var(--ink);border-color:var(--ink)}
    .done-row .t-check svg{display:block}
    .t-check svg{display:none}
    .t-body{flex:1;min-width:0}
    .t-title{font-size:0.88rem;color:var(--ink);font-weight:400;margin-bottom:0.3rem;line-height:1.4}
    .t-meta{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}
    .m-tag{font-size:0.62rem;font-family:var(--mono);padding:2px 8px;border-radius:3px;letter-spacing:0.04em;font-weight:500}
    .m-high{background:var(--red-d);color:var(--red)}.m-med{background:var(--gold-d);color:#a07030}.m-low{background:var(--green-d);color:var(--green)}
    .m-proj{background:var(--paper3);color:var(--mid);border:1px solid var(--rule)}
    .m-rep{background:var(--paper3);color:var(--mid);border:1px solid var(--rule)}
    .m-date{font-size:0.65rem;font-family:var(--mono);color:var(--light)}
    .m-date.late{color:var(--red)}
    .t-acts{display:flex;gap:2px;opacity:0;transition:opacity 0.12s;flex-shrink:0}
    .t-row:hover .t-acts{opacity:1}
    .ib{width:26px;height:26px;border-radius:var(--r);border:none;background:none;color:var(--light);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
    .ib:hover{background:var(--paper3);color:var(--ink);border:1px solid var(--rule)}
    .ib.del:hover{background:var(--red-d);color:var(--red);border-color:rgba(192,57,43,0.2)}

    /* Subtasks */
    .sub-progress{display:flex;align-items:center;gap:8px;margin-top:0.4rem}
    .sub-bar{flex:1;height:2px;background:var(--rule2);border-radius:2px;max-width:80px;overflow:hidden}
    .sub-fill{height:100%;background:var(--ink3);border-radius:2px;transition:width 0.4s}
    .sub-label{font-size:0.62rem;font-family:var(--mono);color:var(--light)}
    .sub-toggle{background:none;border:none;font-size:0.62rem;font-family:var(--mono);color:var(--light);cursor:pointer;display:flex;align-items:center;gap:4px;padding:0;transition:color 0.12s;letter-spacing:0.04em}
    .sub-toggle:hover{color:var(--mid)}
    .sub-list{margin-top:0.5rem;display:flex;flex-direction:column;gap:0.3rem}
    .sub-item{display:flex;align-items:center;gap:8px}
    .s-chk{width:13px;height:13px;border-radius:2px;border:1px solid var(--rule);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
    .s-chk:hover{border-color:var(--ink3)}
    .s-chk.done-s{background:var(--ink3);border-color:var(--ink3)}
    .s-txt{font-size:0.78rem;color:var(--mid);flex:1}
    .s-txt.done-st{text-decoration:line-through;opacity:0.5}
    .sub-add-row{display:flex;gap:0.4rem;margin-top:0.4rem}
    .sub-inp{flex:1;font-size:0.75rem;padding:3px 8px;background:var(--paper3);border:1px solid var(--rule);border-radius:var(--r);color:var(--ink);font-family:var(--sans);outline:none;transition:border 0.12s}
    .sub-inp:focus{border-color:var(--ink3)}
    .sub-inp::placeholder{color:var(--light)}
    .sub-add-btn{font-size:0.72rem;padding:3px 10px;background:none;border:1px solid var(--rule);border-radius:var(--r);color:var(--mid);cursor:pointer;font-family:var(--mono);transition:all 0.12s}
    .sub-add-btn:hover{border-color:var(--ink3);color:var(--ink)}

    /* ── Right panel cards ── */
    .panel-card{background:var(--paper2);border:1px solid var(--rule);border-radius:var(--r2);padding:1.1rem 1.15rem}
    .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.85rem;padding-bottom:0.7rem;border-bottom:1px solid var(--rule2)}
    .card-title{font-family:var(--serif);font-size:1rem;font-weight:400;font-style:italic;color:var(--ink)}
    .card-sub{font-size:0.62rem;font-family:var(--mono);color:var(--light);letter-spacing:0.08em}

    /* ── Streak card (right panel) ── */
    .streak-card-body{display:flex;flex-direction:column;gap:0.85rem}
    .streak-big-row{display:flex;align-items:center;gap:1rem}
    .streak-big-num{font-family:var(--serif);font-size:3rem;font-weight:400;color:var(--gold);line-height:1;letter-spacing:-0.02em}
    .streak-big-label{font-size:0.68rem;font-family:var(--mono);color:var(--light);letter-spacing:0.08em;text-transform:uppercase;margin-top:4px}
    .streak-best{font-size:0.72rem;color:var(--mid)}
    .streak-best span{color:var(--gold);font-weight:500}
    .streak-week{display:flex;gap:4px;align-items:flex-end}
    .sw-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
    .sw-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;background:var(--rule2);transition:height 0.5s ease}
    .sw-bar.done-day{background:var(--gold);opacity:0.8}
    .sw-bar.today-bar{background:var(--gold)}
    .sw-lbl{font-size:0.58rem;font-family:var(--mono);color:var(--light)}
    .streak-message{font-size:0.78rem;color:var(--mid);font-style:italic;padding:0.6rem 0.75rem;background:var(--gold-d);border:1px solid rgba(201,168,76,0.15);border-radius:var(--r);line-height:1.5}

    /* ── AI panel ── */
    .ai-tabs{display:flex;gap:0;margin-bottom:0.85rem;border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
    .ai-tab{flex:1;padding:0.4rem 0.5rem;text-align:center;border:none;background:none;font-size:0.7rem;font-family:var(--mono);color:var(--light);cursor:pointer;transition:all 0.12s;letter-spacing:0.04em;border-right:1px solid var(--rule)}
    .ai-tab:last-child{border-right:none}
    .ai-tab:hover{background:var(--paper3);color:var(--mid)}
    .ai-tab.on{background:var(--ink);color:#fff}
    .ai-body{min-height:80px;margin-bottom:0.85rem}
    .ai-txt{font-size:0.8rem;color:var(--mid);line-height:1.7}
    .ai-txt b{color:var(--ink);font-weight:500}
    .ai-txt ul{margin:0.35rem 0 0 1rem}
    .ai-txt li{margin-bottom:0.2rem}
    .ai-loading{display:flex;align-items:center;gap:8px;color:var(--light);font-size:0.75rem;font-family:var(--mono);padding:0.5rem 0}
    .dots{display:flex;gap:3px}
    .dots span{width:4px;height:4px;border-radius:50%;background:var(--mid);animation:blink 1.2s infinite}
    .dots span:nth-child(2){animation-delay:0.2s}
    .dots span:nth-child(3){animation-delay:0.4s}
    @keyframes blink{0%,100%{opacity:0.2}50%{opacity:1}}
    .ai-row{display:flex;gap:0.4rem}
    .ai-field{flex:1;padding:0.45rem 0.65rem;font-size:0.78rem;font-family:var(--sans);background:var(--paper3);border:1px solid var(--rule);border-radius:var(--r);color:var(--ink);outline:none;transition:border 0.12s}
    .ai-field:focus{border-color:var(--ink3)}
    .ai-field::placeholder{color:var(--light)}
    .ai-go{padding:0.45rem 0.75rem;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-family:var(--mono);font-size:0.72rem;cursor:pointer;transition:background 0.12s;letter-spacing:0.04em}
    .ai-go:hover{background:var(--ink3)}

    /* ── Progress chart ── */
    .week-bars{display:flex;align-items:flex-end;gap:4px;height:60px;margin-bottom:0.5rem}
    .w-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
    .w-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;background:var(--ink);opacity:0.15;transition:height 0.5s ease,opacity 0.5s}
    .w-bar.today{opacity:0.9}.w-bar.past{opacity:0.35}
    .w-lbl{font-size:0.58rem;font-family:var(--mono);color:var(--light)}
    .donut-row{display:flex;align-items:center;gap:1rem;margin-top:0.75rem}
    .donut-svg{flex-shrink:0}
    .legend{display:flex;flex-direction:column;gap:0.35rem}
    .leg{display:flex;align-items:center;gap:8px;font-size:0.73rem;color:var(--mid)}
    .leg-sq{width:8px;height:8px;border-radius:2px;flex-shrink:0}
    .hmap{display:flex;flex-wrap:wrap;gap:3px;margin-top:0.5rem}
    .hm{width:13px;height:13px;border-radius:2px;background:var(--rule2)}
    .hm.l1{background:rgba(10,10,10,0.15)}.hm.l2{background:rgba(10,10,10,0.35)}.hm.l3{background:rgba(10,10,10,0.65)}.hm.l4{background:var(--ink)}

    /* Suggestions */
    .suggestion-list{display:flex;flex-direction:column;gap:0.5rem}
    .suggestion{display:flex;align-items:flex-start;gap:0.6rem;padding:0.6rem 0.65rem;background:var(--paper3);border:1px solid var(--rule);border-radius:var(--r);cursor:pointer;transition:all 0.15s}
    .suggestion:hover{border-color:var(--ink3);background:var(--paper2)}
    .sug-icon{font-size:0.85rem;flex-shrink:0;margin-top:1px}
    .sug-text{font-size:0.78rem;color:var(--mid);line-height:1.4;flex:1}
    .sug-action{font-size:0.62rem;font-family:var(--mono);color:var(--light);white-space:nowrap;align-self:center}

    /* ── Modal / Overlay ── */
    .overlay{position:fixed;inset:0;background:rgba(10,10,10,0.5);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:dropIn 0.15s ease}
    .modal{background:var(--paper2);border:1px solid var(--rule);border-radius:var(--r3);padding:2rem;width:min(560px,94vw);max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2)}
    .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
    .modal-title{font-family:var(--serif);font-size:1.5rem;font-weight:400;font-style:italic}

    /* ── Weekly Review Modal ── */
    .wr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.85rem;margin-bottom:1.5rem}
    .wr-stat{background:var(--paper3);border:1px solid var(--rule);border-radius:var(--r2);padding:1rem;text-align:center}
    .wr-num{font-family:var(--serif);font-size:2.2rem;font-weight:400;color:var(--ink);letter-spacing:-0.02em;line-height:1}
    .wr-num.g{color:var(--green)}.wr-num.r{color:var(--red)}.wr-num.gold{color:var(--gold)}
    .wr-lbl{font-size:0.62rem;font-family:var(--mono);color:var(--light);letter-spacing:0.08em;text-transform:uppercase;margin-top:4px}
    .wr-section{margin-bottom:1.25rem}
    .wr-sec-title{font-size:0.65rem;font-family:var(--mono);color:var(--light);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.6rem;padding-bottom:0.4rem;border-bottom:1px solid var(--rule2)}
    .wr-task-row{display:flex;align-items:center;gap:8px;padding:0.45rem 0;border-bottom:1px solid var(--rule2);font-size:0.82rem;color:var(--mid)}
    .wr-task-row:last-child{border-bottom:none}
    .wr-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .wr-proj-bar{display:flex;flex-direction:column;gap:0.5rem;margin-top:0.25rem}
    .wr-proj-row{display:flex;align-items:center;gap:10px}
    .wr-proj-name{font-size:0.78rem;color:var(--mid);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wr-proj-track{flex:1;height:4px;background:var(--rule2);border-radius:2px;overflow:hidden}
    .wr-proj-fill{height:100%;border-radius:2px;transition:width 0.6s ease}
    .wr-proj-count{font-size:0.65rem;font-family:var(--mono);color:var(--light);width:24px;text-align:right;flex-shrink:0}
    .wr-ai-note{background:var(--gold-d);border:1px solid rgba(201,168,76,0.15);border-radius:var(--r);padding:0.85rem;font-size:0.82rem;color:var(--mid);line-height:1.6;font-style:italic;margin-bottom:1rem}
    .wr-ai-note b{color:var(--ink);font-style:normal;font-weight:500}
    .wr-streak-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:0.5rem}
    .wr-streak-cell{width:28px;height:28px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-family:var(--mono);background:var(--paper3);border:1px solid var(--rule);color:var(--light)}
    .wr-streak-cell.done{background:var(--gold-d);border-color:rgba(201,168,76,0.3);color:#a07030}
    .wr-streak-cell.today{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700}

    /* ── Notification toast ── */
    .toast{
      position:fixed;bottom:1.5rem;right:1.5rem;z-index:500;
      background:var(--ink);color:#fff;
      border-radius:var(--r2);padding:0.85rem 1.1rem;
      display:flex;align-items:flex-start;gap:0.75rem;
      box-shadow:var(--shadow2);
      max-width:300px;
      animation:slideUp 0.3s ease;
      border-left:3px solid var(--gold);
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .toast.hiding{animation:slideDown 0.3s ease forwards}
    @keyframes slideDown{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(16px)}}
    .toast-icon{font-size:1rem;flex-shrink:0;margin-top:1px}
    .toast-body{}
    .toast-title{font-size:0.82rem;font-weight:500;margin-bottom:2px}
    .toast-msg{font-size:0.75rem;color:rgba(255,255,255,0.55);line-height:1.4}
    .toast-close{margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:1rem;padding:0;flex-shrink:0;line-height:1}
    .toast-close:hover{color:rgba(255,255,255,0.7)}

    /* ── Notif permission banner ── */
    .notif-banner{
      background:var(--gold-d);border:1px solid rgba(201,168,76,0.2);border-radius:var(--r);
      padding:0.65rem 0.85rem;display:flex;align-items:center;gap:0.6rem;
      font-size:0.78rem;color:var(--mid);margin-bottom:0.85rem;
    }
    .notif-banner-btn{
      margin-left:auto;font-size:0.7rem;font-family:var(--mono);
      background:var(--gold);color:#fff;border:none;border-radius:var(--r);
      padding:3px 10px;cursor:pointer;white-space:nowrap;
    }

    /* Empty */
    .empty{text-align:center;padding:3rem 1rem;color:var(--light)}
    .empty-mark{font-family:var(--serif);font-size:3rem;font-weight:300;font-style:italic;opacity:0.2;display:block;margin-bottom:0.5rem}
    .empty-txt{font-size:0.8rem;font-family:var(--mono);letter-spacing:0.06em}

    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--rule);border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:var(--mid)}

    @media(max-width:860px){
      .sidebar{display:none}
      .content-grid{grid-template-columns:1fr}
      .side-panel{display:none}
      .stats-bar{display:grid;grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-word">Opus</div>
      <div class="logo-sub">Task Management</div>
    </div>

    <!-- Streak mini widget in sidebar -->
    <div class="streak-pill" id="sidebar-streak">
      <div class="streak-flame">🔥</div>
      <div class="streak-info">
        <div class="streak-num" id="sb-streak-num">0</div>
        <div class="streak-lbl">day streak</div>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-label">Views</div>
      <button class="nav-item active" onclick="setView('all',this)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".6"><rect x="1.5" y="1.5" width="5" height="5" rx="1"/><rect x="9.5" y="1.5" width="5" height="5" rx="1"/><rect x="1.5" y="9.5" width="5" height="5" rx="1"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/></svg>
        All tasks <span class="nav-num" id="nb-all">0</span>
      </button>
      <button class="nav-item" onclick="setView('today',this)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".6"><rect x="2" y="2.5" width="12" height="11" rx="1.5"/><path d="M5 1.5v2M11 1.5v2M2 6.5h12"/></svg>
        Today <span class="nav-num" id="nb-today">0</span>
      </button>
      <button class="nav-item" onclick="setView('upcoming',this)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".6"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
        Upcoming <span class="nav-num" id="nb-up">0</span>
      </button>
      <button class="nav-item" onclick="setView('done',this)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".6"><circle cx="8" cy="8" r="6"/><path d="M5 8l2 2 4-4"/></svg>
        Completed <span class="nav-num" id="nb-done">0</span>
      </button>
      <button class="nav-item" onclick="setView('repeat',this)">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".6"><path d="M3 7A5 5 0 0 1 13 7M13 9A5 5 0 0 1 3 9"/><path d="M11 5h2V3M5 11H3v2"/></svg>
        Recurring <span class="nav-num" id="nb-rep">0</span>
      </button>
      <button class="nav-item" onclick="openWeeklyReview()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".6"><path d="M2 12L6 8l3 3 5-6"/></svg>
        Weekly Review
      </button>
    </div>

    <div class="nav-group">
      <div class="nav-label">Projects</div>
      <div id="proj-nav"></div>
      <button class="nav-item" onclick="openNewProject()" style="color:rgba(201,168,76,0.6);margin-top:3px">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".7"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M5 8h6"/></svg>
        New project
      </button>
    </div>

    <div class="nav-group">
      <div class="nav-label">Priority</div>
      <button class="nav-item" onclick="setView('high',this)">
        <div class="proj-swatch pd-high"></div>High <span class="nav-num" id="nb-hi">0</span>
      </button>
      <button class="nav-item" onclick="setView('medium',this)">
        <div class="proj-swatch pd-med"></div>Medium <span class="nav-num" id="nb-md">0</span>
      </button>
      <button class="nav-item" onclick="setView('low',this)">
        <div class="proj-swatch pd-low"></div>Low <span class="nav-num" id="nb-lo">0</span>
      </button>
    </div>

    <div class="sidebar-bottom">
      <div class="user-row">
        <div class="avatar">U</div>
        <div class="user-info">
          <div class="uname">Your Account</div>
          <div class="uplan">OPUS PRO</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="header">
      <div class="page-title" id="view-title">All tasks</div>
      <div class="divider-v"></div>
      <div class="search-wrap">
        <svg class="s-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="m13 13-3-3"/></svg>
        <input class="search" id="search" type="text" placeholder="Search tasks…" oninput="render()"/>
      </div>
      <div class="header-gap"></div>
      <button class="hbtn gold" onclick="callAI('tip','')">✦ AI insight</button>
      <button class="hbtn" onclick="openWeeklyReview()">📋 Weekly Review</button>
      <button class="hbtn" onclick="callAI('plan','')">Day plan</button>
      <button class="hbtn cta" onclick="toggleForm()">+ New task</button>
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <div class="body">
      <div class="content-grid">
        <div class="task-panel">
          <div id="notif-banner-wrap"></div>
          <div id="add-form-wrap"></div>
          <div class="chip-row" id="chip-row"></div>
          <div id="task-sections"></div>
        </div>

        <div class="side-panel">
          <!-- Streak card -->
          <div class="panel-card">
            <div class="card-head">
              <div class="card-title">Streak</div>
              <div class="card-sub" id="streak-card-sub">0 days</div>
            </div>
            <div class="streak-card-body" id="streak-card-body"></div>
          </div>

          <!-- AI -->
          <div class="panel-card">
            <div class="card-head">
              <div class="card-title">AI Assistant</div>
              <div class="card-sub">OPUS AI</div>
            </div>
            <div class="ai-tabs">
              <button class="ai-tab on" onclick="switchTab('tip',this)">Tip</button>
              <button class="ai-tab" onclick="switchTab('goal',this)">Goal</button>
              <button class="ai-tab" onclick="switchTab('prio',this)">Prioritize</button>
              <button class="ai-tab" onclick="switchTab('summary',this)">Summary</button>
            </div>
            <div class="ai-body" id="ai-body">
              <div class="ai-txt" style="color:var(--light);font-family:var(--mono);font-size:0.72rem">Select a mode to activate AI ✦</div>
            </div>
            <div class="ai-row">
              <input class="ai-field" id="ai-inp" placeholder="Ask anything…" onkeydown="if(event.key==='Enter')sendAI()"/>
              <button class="ai-go" onclick="sendAI()">→</button>
            </div>

          <!-- Progress -->
          <div class="panel-card">
            <div class="card-head">
              <div class="card-title">Progress</div>

          <!-- Activity -->
          <div class="panel-card">

          <!-- Suggestions -->

<!-- Modal -->
<div class="overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────────
  const PROJ_COLORS=['#0a0a0a','#444','#888','#c9a84c','#2d6a4f','#c0392b','#2563eb'];
  let S=JSON.parse(localStorage.getItem('opus-v2')||'null')||{
    tasks:[],
    projects:[
      {id:'p1',name:'Work',color:'#0a0a0a'},
      {id:'p2',name:'Personal',color:'#888'},
      {id:'p3',name:'Health',color:'#2d6a4f'}
    ],
    streak:{count:0,lastDate:'',best:0,history:{}},
    notifEnabled:false
  };
  let view='all', _tab='tip', showForm=false, editId=null, chip='all';
  function save(){localStorage.setItem('opus-v2',JSON.stringify(S))}

  // ── Seed ──────────────────────────────────────────────────────────────────────
  function seed(){
    if(S.tasks.length) return;
    const t=td(),tm=tom();
    S.tasks=[
      {id:1,title:'Review Q3 financial report',priority:'high',projectId:'p1',date:t,subtasks:[{id:11,title:'Check revenue figures',done:false},{id:12,title:'Verify cost breakdown',done:true},{id:13,title:'Executive summary draft',done:false}],done:false,repeat:null,note:'Board meeting Friday',created:Date.now()},
      {id:2,title:'Reply to client proposals',priority:'medium',projectId:'p1',date:t,subtasks:[],done:true,repeat:null,note:'',created:Date.now()-1e3},
      {id:3,title:'Morning workout — 45 min',priority:'medium',projectId:'p3',date:t,subtasks:[],done:false,repeat:'daily',note:'',created:Date.now()-2e3},
      {id:4,title:'New product brief',priority:'high',projectId:'p1',date:tm,subtasks:[{id:14,title:'Market research',done:false},{id:15,title:'Competitive analysis',done:false}],done:false,repeat:null,note:'',created:Date.now()-3e3},
      {id:5,title:'Weekly grocery run',priority:'low',projectId:'p2',date:t,subtasks:[{id:16,title:'Vegetables',done:true},{id:17,title:'Bread & dairy',done:false}],done:false,repeat:'weekly',note:'',created:Date.now()-4e3},
      {id:6,title:'Read — 30 pages',priority:'low',projectId:'p2',date:'',subtasks:[],done:false,repeat:'daily',note:'',created:Date.now()-5e3},
    ];
    // seed some streak history
    for(let i=6;i>=1;i--){
      const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
      if(i!==3&&i!==5) S.streak.history[d]=true;
    }
    S.streak.count=4; S.streak.best=4;
    save();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function td(){return new Date().toISOString().slice(0,10)}
  function tom(){return new Date(Date.now()+86400000).toISOString().slice(0,10)}
  function fdt(d){
    if(!d) return '';
    if(d===td()) return 'Today'; if(d===tom()) return 'Tomorrow';
    return new Date(d+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function proj(id){return S.projects.find(p=>p.id===id)}

  // ── Streak logic ──────────────────────────────────────────────────────────────
  function updateStreak(){
    const t=td();
    const hasDoneToday=S.tasks.some(x=>x.done);
    if(hasDoneToday && !S.streak.history[t]){
      S.streak.history[t]=true;
      const yes=new Date(Date.now()-86400000).toISOString().slice(0,10);
      if(S.streak.history[yes]||S.streak.count===0){
        S.streak.count++;
      } else {
        S.streak.count=1;
      }
      if(S.streak.count>S.streak.best) S.streak.best=S.streak.count;
      S.streak.lastDate=t;
      save();
      if(S.streak.count>1){
        showToast('🔥','Streak extended!',`You're on a ${S.streak.count}-day streak. Keep it up!`);
      }
    }
  }

  function renderStreak(){
    const streak=S.streak.count, best=S.streak.best;
    document.getElementById('sb-streak-num').textContent=streak;
    document.getElementById('streak-card-sub').textContent=`Best: ${best} days`;

    // last 7 days for bar chart
    const days=['Mo','Tu','We','Th','Fr','Sa','Su'];
    const today=new Date();
    const dayOfWeek=(today.getDay()||7)-1;
    const weekBars=Array.from({length:7},(_,i)=>{
      const d=new Date(today); d.setDate(d.getDate()-(dayOfWeek-i));
      const key=d.toISOString().slice(0,10);
      const isToday=key===td();
      const done=!!S.streak.history[key];
      const height=done?40:8;
      return `<div class="sw-col">
      <div class="sw-bar${done?' done-day':''}${isToday?' today-bar':''}" style="height:${height}px"></div>
      <div class="sw-lbl">${days[i]}</div>
    </div>`;
    }).join('');

    const msgs=[
      streak===0 ? 'Complete a task today to start your streak.' :
              streak===1 ? 'Great start — come back tomorrow to extend it.' :
                      streak<5  ? `${streak} days strong. Don\'t break the chain!` :
                              streak<10 ? `Impressive — ${streak} days in a row!` :
                                      `${streak} days. Exceptional consistency. ✦`
    ];

    document.getElementById('streak-card-body').innerHTML=`
    <div class="streak-big-row">
      <div>
        <div class="streak-big-num">${streak}</div>
        <div class="streak-big-label">Day streak</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:0.72rem;color:var(--mid)">Best</div>
        <div style="font-family:var(--serif);font-size:1.5rem;font-weight:400;color:var(--gold)">${best}</div>
      </div>
    </div>
    <div class="streak-week">${weekBars}</div>
    <div class="streak-message">${msgs[0]}</div>`;
  }

  // ── Browser Notifications ─────────────────────────────────────────────────────
  function renderNotifBanner(){
    const wrap=document.getElementById('notif-banner-wrap');
    if(!wrap) return;
    if(S.notifEnabled||Notification.permission==='granted'){
      wrap.innerHTML=''; return;
    }
    if(Notification.permission==='denied'){wrap.innerHTML='';return;}
    wrap.innerHTML=`<div class="notif-banner">
    <span>🔔</span>
    <span>Enable notifications to get reminders for overdue tasks</span>
    <button class="notif-banner-btn" onclick="requestNotif()">Enable</button>
  </div>`;
  }

  function requestNotif(){
    if(!('Notification' in window)){showToast('⚠️','Not supported','Your browser does not support notifications.');return;}
    Notification.requestPermission().then(p=>{
      if(p==='granted'){
        S.notifEnabled=true; save();
        showToast('🔔','Notifications enabled','You\'ll be reminded about overdue and upcoming tasks.');
        document.getElementById('notif-banner-wrap').innerHTML='';
        scheduleNotifCheck();
      } else {
        showToast('⚠️','Permission denied','You can enable notifications in your browser settings.');
      }
    });
  }

  function scheduleNotifCheck(){
    // Check every 30 min for overdue tasks
    checkOverdueTasks();
    setInterval(checkOverdueTasks, 30*60*1000);
  }

  function checkOverdueTasks(){
    if(Notification.permission!=='granted') return;
    const overdue=S.tasks.filter(x=>!x.done&&x.date&&x.date<td());
    const dueSoon=S.tasks.filter(x=>!x.done&&x.date===td());
    if(overdue.length>0){
      new Notification('OPUS — Overdue tasks',{
        body:`You have ${overdue.length} overdue task${overdue.length>1?'s':''}: ${overdue[0].title}${overdue.length>1?'…':''}`,
        icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%230a0a0a"/><text y="22" x="8" font-size="16" fill="%23c9a84c">✦</text></svg>'
      });
    } else if(dueSoon.length>0){
      new Notification('OPUS — Tasks due today',{
        body:`${dueSoon.length} task${dueSoon.length>1?'s':''} due today. ${dueSoon[0].title}`,
      });
    }
  }

  // ── Toast notifications ────────────────────────────────────────────────────────
  let _toastTimer=null;
  function showToast(icon,title,msg,duration=4000){
    const c=document.getElementById('toast-container');
    const id='t'+Date.now();
    const el=document.createElement('div');
    el.className='toast'; el.id=id;
    el.innerHTML=`<div class="toast-icon">${icon}</div>
    <div class="toast-body"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div></div>
    <button class="toast-close" onclick="dismissToast('${id}')">×</button>`;
    c.appendChild(el);
    setTimeout(()=>dismissToast(id),duration);
  }
  function dismissToast(id){
    const el=document.getElementById(id); if(!el) return;

    const projBreakdown=S.projects.map(p=>{

    }).filter(x=>x.total>0);
    const maxProj=Math.max(...projBreakdown.map(x=>x.total),1);

    // Recent completions
    const recentDone=S.tasks.filter(x=>x.done).slice(0,5);
    const recentOverdue=S.tasks.filter(x=>!x.done&&x.date&&x.date<td()).slice(0,4);

    // Streak days grid (last 14 days)
    const streakGrid=Array.from({length:14},(_,i)=>{
      const d=new Date(Date.now()-(13-i)*86400000);
      const key=d.toISOString().slice(0,10);
      const isToday=key===td();
      const done=!!S.streak.history[key];
      const dayNum=d.getDate();
      return `<div class="wr-streak-cell${done?' done':''}${isToday?' today':''}" title="${key}">${dayNum}</div>`;
    }).join('');

    // AI review summary
    let aiNote='Generating AI summary…';
    const summary=S.tasks.slice(0,12).map(t=>`[${t.done?'done':'open'}] ${t.priority} | ${proj(t.projectId)?.name||'?'} | ${t.title}`).join('\n');

    document.getElementById('modal-inner').innerHTML=`
    <div class="modal-head">
      <div class="modal-title">Weekly Review</div>
      <button class="ib" onclick="closeModal()">✕</button>
    </div>

    <div class="wr-ai-note" id="wr-ai-note">

    <div class="wr-grid">

        <div class="wr-lbl">Completed</div>
      </div>
      <div class="wr-stat">
        <div class="wr-num">${addedThisWeek}</div>
        <div class="wr-lbl">Scheduled</div>
      </div>

        <div class="wr-lbl">Overdue</div>

      <div class="wr-stat">

        <div class="wr-lbl">Best streak</div>
      </div>
      <div class="wr-stat">
        <div class="wr-num">${addedThisWeek?Math.round(completedThisWeek/addedThisWeek*100):0}%</div>
        <div class="wr-lbl">Completion</div>
      </div>
    </div>

    ${projBreakdown.length?`<div class="wr-section">
      <div class="wr-sec-title">By project</div>
      <div class="wr-proj-bar">
        ${projBreakdown.map(x=>`<div class="wr-proj-row">

      </div>

      <div class="wr-streak-row">${streakGrid}</div>
    </div>

    ${recentDone.length?`<div class="wr-section">
      <div class="wr-sec-title">Recently completed</div>
      ${recentDone.map(t=>`<div class="wr-task-row">
        <div class="wr-dot" style="background:var(--green)"></div>
        ${esc(t.title)}
      </div>`).join('')}
    </div>`:''}

    ${recentOverdue.length?`<div class="wr-section">
      <div class="wr-sec-title">Still overdue</div>
      ${recentOverdue.map(t=>`<div class="wr-task-row">
        <div class="wr-dot" style="background:var(--red)"></div>

    <div style="display:flex;justify-content:flex-end;gap:0.5rem;padding-top:1rem;border-top:1px solid var(--rule2)">
      <button class="hbtn" onclick="closeModal()">Close</button>

    // Now fetch AI summary
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,
          system:'You are a productivity coach writing a brief weekly review for a task management app. Be concise (2-3 sentences), encouraging but honest. Highlight one win and one area to improve. No bullet points.',

  // ── View & filter ─────────────────────────────────────────────────────────────
  function setView(v,btn){
    view=v;
    document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
    if(btn) btn.classList.add('active');
    const names={all:'All tasks',today:'Today',upcoming:'Upcoming',done:'Completed',repeat:'Recurring',high:'High priority',medium:'Medium priority',low:'Low priority'};
    const p=S.projects.find(x=>x.id===v.replace('proj-',''));
    document.getElementById('view-title').textContent=p?p.name:(names[v]||v);
    render();
  }

  function getList(){
    const q=(document.getElementById('search')?.value||'').toLowerCase();
    let list=S.tasks;
    const t=td();
    if(view==='today') list=list.filter(x=>x.date===t);
    else if(view==='upcoming') list=list.filter(x=>x.date&&x.date>t);
    else if(view==='done') list=list.filter(x=>x.done);
    else if(view==='repeat') list=list.filter(x=>x.repeat);
    else if(view==='high') list=list.filter(x=>x.priority==='high');
    else if(view==='medium') list=list.filter(x=>x.priority==='medium');
    else if(view==='low') list=list.filter(x=>x.priority==='low');
    else if(view.startsWith('proj-')) list=list.filter(x=>x.projectId===view.replace('proj-',''));
    if(q) list=list.filter(x=>x.title.toLowerCase().includes(q)||(x.note||'').toLowerCase().includes(q));
    return list;
  }

  function setChip(v,btn){chip=v;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));if(btn)btn.classList.add('on');renderTasks()}

  function renderTasks(){

      if(chip.startsWith('proj-')) list=list.filter(x=>x.projectId===chip.replace('proj-',''));
      else list=list.filter(x=>x.priority===chip);
    }
    const active=list.filter(x=>!x.done), done=list.filter(x=>x.done);
    const sec=document.getElementById('task-sections');

  // ── Task actions ──────────────────────────────────────────────────────────────
  function toggleDone(id){
    const t=S.tasks.find(x=>x.id===id); if(!t) return;
    t.done=!t.done; save();
    if(t.done) showToast('✓','Task completed',`"${t.title}" marked as done.`);
    render();
  }
  function del(id){S.tasks=S.tasks.filter(x=>x.id!==id);save();render()}
  function toggleSubs(id){const el=document.getElementById('subs-'+id);if(el){el.style.display=el.style.display==='none'?'flex':'none';el.style.flexDirection='column'}}
  function quickSub(id){const el=document.getElementById('subs-'+id);if(el){el.style.display='flex';el.style.flexDirection='column';}setTimeout(()=>document.getElementById('si-'+id)?.focus(),50)}
  function addSub(tid){
    const inp=document.getElementById('si-'+tid);if(!inp) return;
    const v=inp.value.trim();if(!v) return;
    const t=S.tasks.find(x=>x.id===tid);if(!t) return;
    t.subtasks.push({id:Date.now(),title:v,done:false});
    save();render();
    setTimeout(()=>{toggleSubs(tid);document.getElementById('si-'+tid)?.focus();},30);
  }
  function toggleSub(tid,sid){
    const t=S.tasks.find(x=>x.id===tid);if(!t) return;
    const s=t.subtasks.find(x=>x.id===sid);if(s){s.done=!s.done;save();}
    render();
    setTimeout(()=>{const el=document.getElementById('subs-'+tid);if(el){el.style.display='flex';el.style.flexDirection='column';}},20);
  }

  function pickColor(c){
    window._pc=c;
    PROJ_COLORS.forEach(x=>{const el=document.getElementById('clr-'+x.replace('#',''));if(el){el.style.border=x===c?'2px solid var(--ink3)':'2px solid var(--rule)';el.style.boxShadow=x===c?'0 0 0 2px var(--paper2),0 0 0 3px var(--ink3)':'none';}});
  }
  function saveProj(){
    const name=document.getElementById('pn')?.value.trim();if(!name) return;
    S.projects.push({id:'p'+Date.now(),name,color:window._pc||'#888'});
    save();closeModal();render();
  }

  // ── Charts ────────────────────────────────────────────────────────────────────
  function renderCharts(){
    const days=['Mo','Tu','We','Th','Fr','Sa','Su'];
    const day=new Date().getDay()||7;
    const vals=[3,5,2,8,4,6,S.tasks.filter(x=>x.done).length||3];
    const max=Math.max(...vals)||1;
    document.getElementById('week-bars').innerHTML=days.map((d,i)=>`
    <div class="w-col">
      <div class="w-bar${i+1===day?' today':i+1<day?' past':''}" style="height:${Math.round(vals[i]/max*52)+8}px"></div>
      <div class="w-lbl">${d}</div>
    </div>`).join('');
    const done=S.tasks.filter(x=>x.done).length,total=S.tasks.length;
    const pct=total?Math.round(done/total*100):0;
    const r=26,circ=2*Math.PI*r;
    document.getElementById('donut-row').innerHTML=`
    <svg class="donut-svg" width="64" height="64" viewBox="0 0 64 64">
      <circle fill="none" stroke="var(--rule2)" stroke-width="7" cx="32" cy="32" r="${r}"/>
      <circle fill="none" stroke="var(--ink)" stroke-width="7" stroke-linecap="round" cx="32" cy="32" r="${r}"
        stroke-dasharray="${circ}" stroke-dashoffset="${circ-(circ*pct/100)}" transform="rotate(-90 32 32)"/>
      <text x="32" y="36" text-anchor="middle" font-size="10" font-family="Geist Mono,monospace" fill="var(--ink)">${pct}%</text>
    </svg>
    <div class="legend">
      <div class="leg"><div class="leg-sq" style="background:var(--ink)"></div>${done} done</div>
      <div class="leg"><div class="leg-sq" style="background:var(--rule)"></div>${total-done} active</div>
      <div class="leg"><div class="leg-sq" style="background:var(--gold)"></div>${S.tasks.filter(x=>x.repeat).length} recurring</div>
    </div>`;
    const cells=Array.from({length:35},(_,i)=>{
      const lvl=i<done?['l1','l2','l3','l4'][Math.min(Math.floor(Math.random()*4),3)]:'';
      return `<div class="hm${lvl?' '+lvl:''}"></div>`;
    });
    document.getElementById('hmap').innerHTML=cells.join('');
  }

  // ── Suggestions ───────────────────────────────────────────────────────────────
  function renderSuggestions(){
    const high=S.tasks.filter(x=>x.priority==='high'&&!x.done);
    const today_t=S.tasks.filter(x=>x.date===td()&&!x.done);
    const streak=S.streak.count;
    const items=[
      high.length?{icon:'⚑',text:`${high.length} high-priority task${high.length>1?'s':''} pending`,action:'View',fn:"setView('high')"}:null,
      today_t.length?{icon:'◇',text:`${today_t.length} task${today_t.length>1?'s':''} due today`,action:'View',fn:"setView('today')"}:null,
      streak>0?{icon:'🔥',text:`${streak}-day streak — keep it going!`,action:'Review',fn:'openWeeklyReview()'}:null,
      {icon:'✦',text:'Generate AI day plan',action:'Generate',fn:"callAI('plan','')"},
      {icon:'＋',text:'Add your next task',action:'Add',fn:'toggleForm()'},
    ].filter(Boolean).slice(0,4);
    document.getElementById('suggestions').innerHTML=items.map(s=>`
    <div class="suggestion" onclick="${s.fn}">
      <span class="sug-icon">${s.icon}</span>
      <span class="sug-text">${s.text}</span>
      <span class="sug-action">${s.action} →</span>
    </div>`).join('');
  }

  // ── AI ────────────────────────────────────────────────────────────────────────
  function switchTab(t,btn){
    _tab=t;
    document.querySelectorAll('.ai-tab').forEach(x=>x.classList.remove('on'));
    if(btn)btn.classList.add('on');
    const ph={tip:'Ask anything…',goal:'Enter a goal, e.g. "get fit"',prio:'Ask for prioritization…',summary:'Ask for a summary…'};
    document.getElementById('ai-inp').placeholder=ph[t]||'Ask anything…';
    if(t==='tip'||t==='prio'||t==='summary') callAI(t,'');
    else document.getElementById('ai-body').innerHTML=`<div class="ai-txt" style="color:var(--light);font-family:var(--mono);font-size:0.72rem">Type a goal and press → to generate tasks</div>`;
  }
  function sendAI(){const v=document.getElementById('ai-inp').value.trim();document.getElementById('ai-inp').value='';callAI(_tab,v)}
  async function callAI(mode,msg){
    const el=document.getElementById('ai-body');if(!el) return;
    el.innerHTML=`<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div> Thinking…</div>`;
    const summary=S.tasks.slice(0,12).map(t=>`[${t.done?'done':'open'}] ${t.priority} | ${proj(t.projectId)?.name||'?'} | ${t.title}${t.date?' ('+fdt(t.date)+')':''}`).join('\n')||'No tasks yet.';
    const configs={
      tip:{s:'You are a concise productivity coach in a task manager. Give one specific, actionable tip in 2-3 sentences based on the tasks. Respond in the same language as the tasks.',u:`Tasks:\n${summary}\n${msg?'Q: '+msg:''}`},
      goal:{s:'You are a task planning AI. The user gives a goal. Return 5-6 concrete, actionable to-do items as a bullet list. Be specific. Match the language of the goal.',u:`Goal: ${msg||'be more productive'}`},
      prio:{s:'You are a prioritization expert. Analyze tasks and recommend which 3 to tackle first and why. Be direct and brief (3 sentences + bullet list). Match task language.',u:`Tasks:\n${summary}\n${msg?'Q: '+msg:''}`},
      summary:{s:'Summarize productivity status, what went well, and what needs attention. Max 3-4 sentences. Match language of tasks.',u:`Tasks:\n${summary}`},
      plan:{s:'Create a realistic time-blocked day plan using only today\'s open tasks. Use clear time blocks. Be practical. Match task language.',u:`Open today:\n${S.tasks.filter(x=>!x.done&&x.date===td()).map(t=>t.title).join('\n')||'Nothing scheduled for today'}`},
      chat:{s:'You are a helpful AI assistant inside a premium task management app. Answer questions about tasks and productivity. Be concise and helpful.',u:`Tasks:\n${summary}\nQuestion: ${msg}`}
    };
    const cfg=configs[mode]||configs.chat;
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:cfg.s,messages:[{role:'user',content:cfg.u}]})});
      const d=await r.json();
      const txt=(d.content||[]).map(b=>b.text||'').join('');
      el.innerHTML=`<div class="ai-txt">${txt.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>')}</div>`;
    }catch(e){
      el.innerHTML=`<div class="ai-txt" style="color:var(--red)">Could not connect to AI.</div>`;
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────────────
  seed(); render();
  if(Notification.permission==='granted') scheduleNotifCheck();
</script>
</body>
</html>
