<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Taskflow — AI Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --c1:#7c3aed;--c2:#2563eb;--c3:#06b6d4;
      --grad:linear-gradient(135deg,#7c3aed,#2563eb,#06b6d4);
      --g2:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(37,99,235,0.1));
      --glass:rgba(255,255,255,0.06);
      --glass2:rgba(255,255,255,0.1);
      --glass3:rgba(255,255,255,0.14);
      --border:rgba(255,255,255,0.1);
      --border2:rgba(255,255,255,0.18);
      --text:#f1f0ff;--text2:#a89fc8;--text3:#5e5678;
      --bg:#0a0812;--bg2:#0f0c1a;--bg3:#150f24;
      --red:#f87171;--red-d:rgba(248,113,113,0.15);
      --amber:#fbbf24;--amber-d:rgba(251,191,36,0.13);
      --green:#34d399;--green-d:rgba(52,211,153,0.13);
      --blue:#60a5fa;--blue-d:rgba(96,165,250,0.13);
      --purple:#a78bfa;--purple-d:rgba(167,139,250,0.13);
      --r:12px;--r2:18px;--r3:24px;
      --sans:'Manrope',sans-serif;--display:'Syne',sans-serif;--mono:'Syne Mono',monospace;
    }
    html{font-size:14px;scroll-behavior:smooth}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

    /* BG mesh */
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
              radial-gradient(ellipse 60% 50% at 15% 20%,rgba(124,58,237,0.18) 0%,transparent 70%),
              radial-gradient(ellipse 50% 40% at 85% 80%,rgba(37,99,235,0.14) 0%,transparent 70%),
              radial-gradient(ellipse 40% 35% at 70% 10%,rgba(6,182,212,0.1) 0%,transparent 70%);
    }
    body::after{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Layout */
    .shell{position:relative;z-index:1;display:flex;height:100vh;overflow:hidden}

    /* Sidebar */
    .sidebar{
      width:260px;flex-shrink:0;
      background:rgba(15,12,26,0.8);
      border-right:1px solid var(--border);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      display:flex;flex-direction:column;
      padding:1.5rem 1rem;overflow-y:auto;
    }
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem;padding:0.25rem 0.5rem}
    .logo-orb{
      width:34px;height:34px;border-radius:10px;
      background:var(--grad);
      display:flex;align-items:center;justify-content:center;
      font-size:16px;flex-shrink:0;box-shadow:0 0 20px rgba(124,58,237,0.4);
    }
    .logo-name{font-family:var(--display);font-size:1.3rem;font-weight:700;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    .snav-section{margin-bottom:1.2rem}
    .snav-label{font-size:0.65rem;font-weight:600;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;padding:0 0.6rem;margin-bottom:0.4rem}
    .snav-item{
      display:flex;align-items:center;gap:9px;padding:0.5rem 0.6rem;
      border-radius:var(--r);color:var(--text2);cursor:pointer;
      border:none;background:none;width:100%;text-align:left;font-family:var(--sans);font-size:0.85rem;
      transition:all 0.18s;position:relative;
    }
    .snav-item:hover{color:var(--text);background:var(--glass)}
    .snav-item.active{color:#fff;background:var(--glass2);border:1px solid var(--border2)}
    .snav-item.active::before{
      content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;
      background:var(--grad);border-radius:2px;
    }
    .snav-badge{margin-left:auto;font-size:0.68rem;font-family:var(--mono);
      background:var(--glass2);padding:1px 7px;border-radius:20px;color:var(--text2)}
    .snav-item.active .snav-badge{background:rgba(124,58,237,0.25);color:var(--purple)}

    .project-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .icon16{width:16px;height:16px;flex-shrink:0;opacity:0.7}
    .snav-item.active .icon16{opacity:1}

    /* Sidebar footer */
    .sidebar-footer{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)}
    .user-card{
      display:flex;align-items:center;gap:10px;padding:0.6rem 0.5rem;
      border-radius:var(--r);cursor:pointer;
      transition:background 0.18s;
    }
    .user-card:hover{background:var(--glass)}
    .avatar{
      width:32px;height:32px;border-radius:50%;
      background:var(--grad);display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;flex-shrink:0;
    }
    .user-name{font-size:0.82rem;font-weight:500}
    .user-sub{font-size:0.7rem;color:var(--text3)}

    /* Main */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}

    /* Topbar */
    .topbar{
      background:rgba(15,12,26,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:0.85rem 1.5rem;display:flex;align-items:center;gap:0.75rem;flex-shrink:0;
    }
    .page-title{font-family:var(--display);font-size:1.1rem;font-weight:700;flex-shrink:0;margin-right:0.5rem}
    .search-wrap{position:relative;flex:1;max-width:340px}
    .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.35;pointer-events:none}
    .search{
      width:100%;padding:0.5rem 0.75rem 0.5rem 2rem;
      background:var(--glass);border:1px solid var(--border);
      border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:0.83rem;outline:none;
      transition:all 0.18s;
    }
    .search:focus{border-color:var(--border2);background:var(--glass2)}
    .search::placeholder{color:var(--text3)}
    .topbar-spacer{flex:1}
    .top-btn{
      display:flex;align-items:center;gap:6px;padding:0.45rem 0.9rem;
      border-radius:var(--r);border:1px solid var(--border);background:var(--glass);
      color:var(--text2);font-family:var(--sans);font-size:0.8rem;cursor:pointer;
      transition:all 0.18s;white-space:nowrap;
    }
    .top-btn:hover{border-color:var(--border2);color:var(--text);background:var(--glass2)}
    .top-btn.primary{
      background:var(--grad);color:#fff;border-color:transparent;font-weight:600;
      box-shadow:0 0 20px rgba(124,58,237,0.3);
    }
    .top-btn.primary:hover{opacity:0.88;box-shadow:0 0 30px rgba(124,58,237,0.45)}

    /* Content */
    .content{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem}

    /* Glass card base */
    .glass-card{
      background:var(--glass);border:1px solid var(--border);
      border-radius:var(--r2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    }
    .glass-card-inner{
      background:var(--glass2);border:1px solid var(--border2);
      border-radius:var(--r);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    }

    /* Stats row */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0.85rem}
    .stat-card{
      background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);
      padding:1rem 1.15rem;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      position:relative;overflow:hidden;transition:border 0.2s,transform 0.2s;cursor:default;
    }
    .stat-card::before{
      content:'';position:absolute;inset:0;opacity:0;
      background:var(--g2);transition:opacity 0.2s;
    }
    .stat-card:hover{border-color:var(--border2);transform:translateY(-1px)}
    .stat-card:hover::before{opacity:1}
    .stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem}
    .stat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
    .stat-trend{font-size:0.68rem;font-family:var(--mono);padding:2px 7px;border-radius:20px}
    .stat-num{font-family:var(--display);font-size:1.8rem;font-weight:700;line-height:1}
    .stat-label{font-size:0.72rem;color:var(--text3);margin-top:3px;font-weight:500;letter-spacing:0.04em}
    .stat-bar{height:3px;border-radius:3px;margin-top:0.75rem;background:var(--glass2);overflow:hidden}
    .stat-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease}

    /* Progress ring */
    .pring-wrap{display:flex;align-items:center;gap:0.75rem}
    .pring{position:relative;width:40px;height:40px;flex-shrink:0}
    .pring svg{transform:rotate(-90deg)}
    .pring-bg{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4}
    .pring-fill{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 0.8s ease}
    .pring-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-family:var(--mono);color:var(--text2)}

    /* Two-col layout */
    .two-col{display:grid;grid-template-columns:1fr 340px;gap:1.25rem;align-items:start}

    /* Task section */
    .section-head{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.85rem}
    .section-title{font-family:var(--display);font-size:1rem;font-weight:700}
    .section-line{flex:1;height:1px;background:var(--border)}
    .section-count{font-size:0.72rem;font-family:var(--mono);color:var(--text3);padding:2px 8px;background:var(--glass);border-radius:20px;border:1px solid var(--border)}

    /* Filter chips */
    .chip-row{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1rem}
    .chip{
      font-size:0.75rem;padding:4px 12px;border-radius:20px;
      border:1px solid var(--border);background:none;color:var(--text2);
      cursor:pointer;font-family:var(--sans);transition:all 0.15s;
    }
    .chip:hover{border-color:var(--border2);color:var(--text)}
    .chip.active{background:rgba(124,58,237,0.2);border-color:rgba(167,139,250,0.4);color:var(--purple)}

    /* Task list */
    .task-stack{display:flex;flex-direction:column;gap:0.55rem}
    .task-card{
      background:var(--glass);border:1px solid var(--border);border-radius:var(--r);
      padding:0.8rem 0.9rem;display:flex;align-items:flex-start;gap:0.75rem;
      transition:all 0.18s;animation:fadeSlide 0.2s ease both;cursor:default;
      position:relative;overflow:hidden;
    }
    .task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0;transition:all 0.2s}
    .task-card.pri-high::before{background:var(--red)}
    .task-card.pri-medium::before{background:var(--amber)}
    .task-card.pri-low::before{background:var(--green)}
    .task-card:hover{border-color:var(--border2);background:var(--glass2);transform:translateX(2px)}
    .task-card.done-task{opacity:0.45}
    .task-card.done-task .task-title{text-decoration:line-through;color:var(--text2)}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

    .task-check-btn{
      width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);
      background:none;cursor:pointer;flex-shrink:0;margin-top:1px;
      display:flex;align-items:center;justify-content:center;transition:all 0.18s;
    }
    .task-check-btn:hover{border-color:var(--green);background:var(--green-d)}
    .done-task .task-check-btn{background:var(--green);border-color:var(--green)}
    .check-svg{display:none}
    .done-task .check-svg{display:block}

    .task-body{flex:1;min-width:0}
    .task-title{font-size:0.88rem;font-weight:500;margin-bottom:0.3rem;color:var(--text)}
    .task-meta{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap}
    .tag{font-size:0.65rem;font-family:var(--mono);padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:0.03em}
    .t-high{background:var(--red-d);color:var(--red)}
    .t-med{background:var(--amber-d);color:var(--amber)}
    .t-low{background:var(--green-d);color:var(--green)}
    .t-cat{background:var(--glass2);color:var(--text2);border:1px solid var(--border)}
    .t-rep{background:var(--purple-d);color:var(--purple)}
    .t-date{font-size:0.68rem;color:var(--text3);font-family:var(--mono)}
    .t-date.overdue{color:var(--red)}

    .task-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
    .task-acts{display:flex;gap:3px;opacity:0;transition:opacity 0.15s}
    .task-card:hover .task-acts{opacity:1}
    .iBtn{
      width:26px;height:26px;border-radius:6px;border:none;background:none;
      color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all 0.15s;
    }
    .iBtn:hover{background:var(--glass2);color:var(--text)}
    .iBtn.del:hover{background:var(--red-d);color:var(--red)}

    /* Subtasks */
    .subtask-list{margin-top:0.5rem;margin-left:0.25rem;display:flex;flex-direction:column;gap:0.3rem}
    .subtask-item{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text2)}
    .sub-check{
      width:14px;height:14px;border-radius:3px;border:1px solid var(--border2);
      background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;
    }
    .sub-check:hover{border-color:var(--green)}
    .sub-check.done-sub{background:var(--green);border-color:var(--green)}
    .sub-title{flex:1}
    .sub-title.done-sub-txt{text-decoration:line-through;opacity:0.5}
    .sub-prog{font-size:0.65rem;font-family:var(--mono);color:var(--text3);margin-left:0.3rem;white-space:nowrap}
    .sub-progbar{height:2px;background:var(--glass2);border-radius:2px;margin-top:4px;overflow:hidden}
    .sub-progbar-fill{height:100%;border-radius:2px;background:var(--green);transition:width 0.4s}

    /* Expand btn */
    .expand-btn{
      background:none;border:none;color:var(--text3);cursor:pointer;
      font-size:0.7rem;font-family:var(--mono);display:flex;align-items:center;gap:4px;
      padding:2px 0;transition:color 0.15s;margin-top:0.25rem;
    }
    .expand-btn:hover{color:var(--text2)}

    /* Right column */
    .right-col{display:flex;flex-direction:column;gap:1rem}

    /* AI panel */
    .ai-panel{
      background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);
      padding:1.1rem 1.15rem;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      position:relative;overflow:hidden;
    }
    .ai-panel::before{
      content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;
      background:radial-gradient(circle,rgba(124,58,237,0.15),transparent 70%);
      pointer-events:none;
    }
    .ai-header{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.85rem}
    .ai-orb{
      width:28px;height:28px;border-radius:8px;background:var(--grad);
      display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
      box-shadow:0 0 12px rgba(124,58,237,0.35);
    }
    .ai-label{font-family:var(--display);font-size:0.95rem;font-weight:700}
    .ai-badge2{font-size:0.6rem;font-family:var(--mono);background:rgba(124,58,237,0.2);color:var(--purple);padding:2px 7px;border-radius:20px;border:1px solid rgba(167,139,250,0.25)}
    .ai-tabs{display:flex;gap:0.3rem;margin-bottom:0.85rem;background:var(--glass);border-radius:var(--r);padding:3px}
    .ai-tab{
      flex:1;padding:0.35rem 0.5rem;border-radius:8px;font-size:0.72rem;font-family:var(--sans);
      border:none;background:none;color:var(--text3);cursor:pointer;transition:all 0.15s;text-align:center;
    }
    .ai-tab.active{background:var(--glass2);color:var(--text);border:1px solid var(--border)}
    .ai-body{min-height:80px}
    .ai-text{font-size:0.82rem;color:var(--text2);line-height:1.65}
    .ai-text b{color:var(--text);font-weight:600}
    .ai-text ul{margin:0.4rem 0 0 1rem}
    .ai-text li{margin-bottom:0.2rem}
    .ai-loading{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:0.8rem;padding:0.5rem 0}
    .dot3{display:flex;gap:4px}
    .dot3 i{width:5px;height:5px;border-radius:50%;background:var(--purple);animation:dp 1.2s infinite;display:block}
    .dot3 i:nth-child(2){animation-delay:0.2s}
    .dot3 i:nth-child(3){animation-delay:0.4s}
    @keyframes dp{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}

    .ai-input-row{display:flex;gap:0.5rem;margin-top:0.85rem}
    .ai-inp{
      flex:1;padding:0.45rem 0.7rem;background:var(--glass2);border:1px solid var(--border);
      border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:0.8rem;outline:none;
      transition:border 0.15s;
    }
    .ai-inp:focus{border-color:rgba(167,139,250,0.4)}
    .ai-inp::placeholder{color:var(--text3)}
    .ai-send{
      padding:0.45rem 0.8rem;border-radius:var(--r);background:var(--grad);
      border:none;color:#fff;font-family:var(--sans);font-size:0.78rem;cursor:pointer;
      transition:opacity 0.15s;font-weight:600;
    }
    .ai-send:hover{opacity:0.85}

    /* Mini chart */
    .chart-panel{
      background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);
      padding:1rem 1.15rem;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    }
    .chart-title{font-family:var(--display);font-size:0.88rem;font-weight:700;margin-bottom:0.85rem;display:flex;align-items:center;justify-content:space-between}
    .chart-sub{font-size:0.7rem;color:var(--text3);font-family:var(--mono)}
    .bar-chart{display:flex;align-items:flex-end;gap:5px;height:70px}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
    .bar-fill{width:100%;border-radius:4px 4px 0 0;background:var(--grad);min-height:4px;transition:height 0.5s ease;opacity:0.8}
    .bar-fill.done-bar{background:linear-gradient(135deg,var(--green),var(--blue));opacity:0.7}
    .bar-lbl{font-size:0.6rem;font-family:var(--mono);color:var(--text3)}

    /* Donut chart */
    .donut-row{display:flex;align-items:center;gap:1rem}
    .donut-wrap{position:relative;width:70px;height:70px;flex-shrink:0}
    .donut-wrap svg{transform:rotate(-90deg)}
    .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .donut-pct{font-size:0.9rem;font-family:var(--mono);font-weight:600}
    .donut-sub2{font-size:0.58rem;color:var(--text3)}
    .legend{display:flex;flex-direction:column;gap:0.4rem}
    .leg-item{display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;color:var(--text2)}
    .leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

    /* Add task form */
    .add-form{
      background:var(--glass);border:1px solid var(--border2);border-radius:var(--r2);
      padding:1.1rem;animation:fadeSlide 0.2s ease;backdrop-filter:blur(16px);
    }
    .form-title{font-family:var(--display);font-size:0.95rem;font-weight:700;margin-bottom:0.85rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.65rem}
    .f-inp{
      width:100%;padding:0.5rem 0.7rem;
      background:var(--glass2);border:1px solid var(--border);
      border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:0.83rem;outline:none;
      transition:border 0.15s;
    }
    .f-inp:focus{border-color:rgba(167,139,250,0.4)}
    .f-inp::placeholder{color:var(--text3)}
    select.f-inp{cursor:pointer}
    .f-inp.full{grid-column:1/-1}
    .form-acts{display:flex;justify-content:flex-end;gap:0.5rem;margin-top:0.75rem}
    .sub-add-row{display:flex;gap:0.5rem;margin-top:0.5rem}

    /* Modal */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(10,8,18,0.75);z-index:200;
      display:flex;align-items:center;justify-content:center;
      backdrop-filter:blur(8px);animation:fadeSlide 0.15s ease;
    }
    .modal{
      background:rgba(20,16,35,0.95);border:1px solid var(--border2);border-radius:var(--r3);
      padding:1.5rem;width:min(500px,94vw);max-height:90vh;overflow-y:auto;
      backdrop-filter:blur(32px);
    }
    .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
    .modal-title{font-family:var(--display);font-size:1.1rem;font-weight:700}

    /* Project modal chips */
    .project-picker{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.65rem}
    .proj-chip{
      display:flex;align-items:center;gap:6px;padding:0.4rem 0.85rem;
      border-radius:20px;border:1px solid var(--border);background:var(--glass);
      color:var(--text2);cursor:pointer;font-size:0.8rem;font-family:var(--sans);transition:all 0.15s;
    }
    .proj-chip:hover{border-color:var(--border2);color:var(--text)}
    .proj-chip.sel{border-color:rgba(167,139,250,0.5);background:var(--purple-d);color:var(--purple)}

    /* Heatmap */
    .heatmap{display:flex;gap:3px;flex-wrap:wrap;margin-top:0.5rem}
    .hm-cell{width:14px;height:14px;border-radius:3px;background:var(--glass2)}
    .hm-cell.hm1{background:rgba(167,139,250,0.2)}
    .hm-cell.hm2{background:rgba(167,139,250,0.45)}
    .hm-cell.hm3{background:rgba(167,139,250,0.75)}

    /* Scrollbar */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--glass2);border-radius:4px}

    /* Empty */
    .empty{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:0.85rem}
    .empty-icon{font-size:2rem;opacity:0.2;margin-bottom:0.6rem}

    /* Tooltip */
    [title]:hover::after{
      content:attr(title);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);
      background:var(--bg2);border:1px solid var(--border);border-radius:6px;
      padding:3px 8px;font-size:0.7rem;white-space:nowrap;z-index:99;pointer-events:none;
      color:var(--text);font-family:var(--mono);
    }
    [title]{position:relative}

    @media(max-width:900px){
      .sidebar{display:none}
      .two-col{grid-template-columns:1fr}
      .right-col{display:none}
      .stats-row{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-orb">✦</div>
      <span class="logo-name">Taskflow</span>
    </div>

    <div class="snav-section">
      <div class="snav-label">Overzicht</div>
      <button class="snav-item active" onclick="setView('all',this)">
        <svg class="icon16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        Alle taken <span class="snav-badge" id="nb-all">0</span>
      </button>
      <button class="snav-item" onclick="setView('today',this)">
        <svg class="icon16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 1v2M11 1v2"/><path d="M2 6h12"/></svg>
        Vandaag <span class="snav-badge" id="nb-today">0</span>
      </button>
      <button class="snav-item" onclick="setView('upcoming',this)">
        <svg class="icon16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
        Aankomend <span class="snav-badge" id="nb-up">0</span>
      </button>
      <button class="snav-item" onclick="setView('done',this)">
        <svg class="icon16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M5 8l2 2 4-4"/></svg>
        Voltooid <span class="snav-badge" id="nb-done">0</span>
      </button>
      <button class="snav-item" onclick="setView('repeat',this)">
        <svg class="icon16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8a5 5 0 0 1 9-3M13 8a5 5 0 0 1-9 3"/><path d="M11 5h2V3M5 11H3v2"/></svg>
        Herhalend <span class="snav-badge" id="nb-rep">0</span>
      </button>
    </div>

    <div class="snav-section">
      <div class="snav-label">Projecten</div>
      <div id="proj-nav"></div>
      <button class="snav-item" onclick="openNewProject()" style="color:var(--purple);margin-top:0.25rem">
        <svg class="icon16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M5 8h6"/></svg>
        Nieuw project
      </button>
    </div>

    <div class="snav-section">
      <div class="snav-label">Prioriteit</div>
      <button class="snav-item" onclick="setView('high',this)">
        <div class="project-dot" style="background:var(--red)"></div>Hoog <span class="snav-badge" id="nb-hi">0</span>
      </button>
      <button class="snav-item" onclick="setView('medium',this)">
        <div class="project-dot" style="background:var(--amber)"></div>Middel <span class="snav-badge" id="nb-md">0</span>
      </button>
      <button class="snav-item" onclick="setView('low',this)">
        <div class="project-dot" style="background:var(--green)"></div>Laag <span class="snav-badge" id="nb-lo">0</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">JD</div>
        <div><div class="user-name">Jij</div><div class="user-sub">Pro plan ✦</div></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="page-title" id="view-title">Alle taken</div>
      <div class="search-wrap">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search" id="search" type="text" placeholder="Zoeken…" oninput="render()"/>
      </div>
      <div class="topbar-spacer"></div>
      <button class="top-btn" onclick="openAI('plan')">📅 Dagplanning</button>
      <button class="top-btn" onclick="openAI('summary')">📊 Samenvatting</button>
      <button class="top-btn primary" onclick="toggleAddForm()">+ Taak toevoegen</button>
    </div>

    <!-- Content -->
    <div class="content" id="content-area">
      <!-- Stats -->
      <div class="stats-row" id="stats-row"></div>

      <!-- Add form placeholder -->
      <div id="add-form-wrap" style="display:none"></div>

      <!-- Two-col -->
      <div class="two-col">
        <div id="task-col">
          <!-- chips + tasks injected here -->
        </div>
        <div class="right-col">
          <!-- AI Panel -->
          <div class="ai-panel" id="ai-panel">
            <div class="ai-header">
              <div class="ai-orb">✦</div>
              <span class="ai-label">AI Assistent</span>
              <span class="ai-badge2">LIVE</span>
            </div>
            <div class="ai-tabs">
              <button class="ai-tab active" onclick="switchAITab('tip',this)">Tip</button>
              <button class="ai-tab" onclick="switchAITab('goal',this)">Doel → Taken</button>
              <button class="ai-tab" onclick="switchAITab('prio',this)">Prioritering</button>
            </div>
            <div class="ai-body" id="ai-body">
              <div class="ai-text" style="color:var(--text3);font-size:0.8rem">Klik op een tabblad om de AI te activeren ✦</div>
            </div>
            <div class="ai-input-row" id="ai-input-row">
              <input class="ai-inp" id="ai-inp" type="text" placeholder="Stel een vraag…" onkeydown="if(event.key==='Enter')sendAI()"/>
              <button class="ai-send" onclick="sendAI()">→</button>
            </div>
          </div>

          <!-- Chart panel -->
          <div class="chart-panel">
            <div class="chart-title">
              Voortgang <span class="chart-sub" id="week-label"></span>
            </div>
            <div id="week-chart"></div>
            <div style="height:0.85rem"></div>
            <div class="donut-row" id="donut-row"></div>
          </div>

          <!-- Heatmap -->
          <div class="chart-panel">
            <div class="chart-title">Activiteit <span class="chart-sub">deze maand</span></div>
            <div class="heatmap" id="heatmap"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────────
  const PROJ_COLORS = ['#a78bfa','#60a5fa','#34d399','#fbbf24','#f87171','#f472b6','#38bdf8'];
  let state = JSON.parse(localStorage.getItem('tf3-state') || 'null') || {
    tasks: [],
    projects: [
      {id:'p1',name:'Werk',color:'#a78bfa'},
      {id:'p2',name:'Persoonlijk',color:'#60a5fa'},
      {id:'p3',name:'Gezondheid',color:'#34d399'}
    ],
    activeView: 'all'
  };
  let currentView = 'all';
  let showAddForm = false;
  let editId = null;
  let activeAITab = 'tip';

  function save(){ localStorage.setItem('tf3-state', JSON.stringify(state)) }

  // ─── Seed ────────────────────────────────────────────────────────────────────
  function seed(){
    if(state.tasks.length) return;
    const td = today(), tm = tomorrow();
    state.tasks = [
      {id:1,title:'Kwartaalrapport afronden',priority:'high',projectId:'p1',date:td,subtasks:[{id:101,title:'Inleiding schrijven',done:false},{id:102,title:'Grafieken updaten',done:true},{id:103,title:'Review met manager',done:false}],done:false,repeat:null,note:'Deadline nadert!',created:Date.now()},
      {id:2,title:'E-mails beantwoorden',priority:'medium',projectId:'p1',date:td,subtasks:[],done:true,repeat:null,note:'',created:Date.now()-1000},
      {id:3,title:'30 min sporten',priority:'medium',projectId:'p3',date:td,subtasks:[],done:false,repeat:'daily',note:'',created:Date.now()-2000},
      {id:4,title:'Nieuw project voorstel schrijven',priority:'high',projectId:'p1',date:tm,subtasks:[{id:104,title:'Marktanalyse',done:false},{id:105,title:'Budget inschatting',done:false}],done:false,repeat:null,note:'',created:Date.now()-3000},
      {id:5,title:'Boodschappen doen',priority:'low',projectId:'p2',date:td,subtasks:[{id:106,title:'Groenten',done:true},{id:107,title:'Fruit',done:false},{id:108,title:'Brood',done:false}],done:false,repeat:'weekly',note:'',created:Date.now()-4000},
      {id:6,title:'Boek lezen — 20 pagina\'s',priority:'low',projectId:'p2',date:'',subtasks:[],done:false,repeat:'daily',note:'',created:Date.now()-5000},
    ];
    save();
  }

  // ─── Date helpers ─────────────────────────────────────────────────────────────
  function today(){ return new Date().toISOString().slice(0,10) }
  function tomorrow(){ return new Date(Date.now()+86400000).toISOString().slice(0,10) }
  function fmtDate(d){
    if(!d) return '';
    const t=today(), tm=tomorrow();
    if(d===t) return 'Vandaag';
    if(d===tm) return 'Morgen';
    return new Date(d+'T12:00').toLocaleDateString('nl-NL',{day:'numeric',month:'short'});
  }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

  // ─── Filter ───────────────────────────────────────────────────────────────────
  function getFiltered(){
    const q = (document.getElementById('search')?.value||'').toLowerCase();
    let list = state.tasks;
    const t = today(), tm = tomorrow();
    if(currentView==='today') list=list.filter(x=>x.date===t);
    else if(currentView==='upcoming') list=list.filter(x=>x.date&&x.date>t);
    else if(currentView==='done') list=list.filter(x=>x.done);
    else if(currentView==='repeat') list=list.filter(x=>x.repeat);
    else if(currentView==='high') list=list.filter(x=>x.priority==='high');
    else if(currentView==='medium') list=list.filter(x=>x.priority==='medium');
    else if(currentView==='low') list=list.filter(x=>x.priority==='low');
    else if(currentView.startsWith('proj-')) list=list.filter(x=>x.projectId===currentView.replace('proj-',''));
    if(q) list=list.filter(x=>x.title.toLowerCase().includes(q)||(x.note||'').toLowerCase().includes(q));
    return list;
  }

  // ─── Views ────────────────────────────────────────────────────────────────────
  function setView(v, btn){
    currentView=v;
    document.querySelectorAll('.snav-item').forEach(el=>el.classList.remove('active'));
    if(btn) btn.classList.add('active');
    const names = {all:'Alle taken',today:'Vandaag',upcoming:'Aankomend',done:'Voltooid',repeat:'Herhalend',high:'Hoge prioriteit',medium:'Gemiddelde prioriteit',low:'Lage prioriteit'};
    const proj = state.projects.find(p=>p.id===v.replace('proj-',''));
    document.getElementById('view-title').textContent = proj ? proj.name : (names[v]||v);
    render();
  }

  // ─── Sidebar ──────────────────────────────────────────────────────────────────
  function renderSidebar(){
    const t = today(), tm = tomorrow();
    document.getElementById('nb-all').textContent = state.tasks.length;
    document.getElementById('nb-today').textContent = state.tasks.filter(x=>x.date===t).length;
    document.getElementById('nb-up').textContent = state.tasks.filter(x=>x.date&&x.date>t).length;
    document.getElementById('nb-done').textContent = state.tasks.filter(x=>x.done).length;
    document.getElementById('nb-rep').textContent = state.tasks.filter(x=>x.repeat).length;
    document.getElementById('nb-hi').textContent = state.tasks.filter(x=>x.priority==='high').length;
    document.getElementById('nb-md').textContent = state.tasks.filter(x=>x.priority==='medium').length;
    document.getElementById('nb-lo').textContent = state.tasks.filter(x=>x.priority==='low').length;
    document.getElementById('proj-nav').innerHTML = state.projects.map(p=>`
    <button class="snav-item${currentView==='proj-'+p.id?' active':''}" onclick="setView('proj-${p.id}',this)">
      <div class="project-dot" style="background:${p.color}"></div>${esc(p.name)}
      <span class="snav-badge">${state.tasks.filter(x=>x.projectId===p.id).length}</span>
    </button>`).join('');
  }

  // ─── Stats ────────────────────────────────────────────────────────────────────
  function renderStats(){
    const total=state.tasks.length, done=state.tasks.filter(x=>x.done).length;
    const high=state.tasks.filter(x=>x.priority==='high'&&!x.done).length;
    const pct = total?Math.round(done/total*100):0;
    const r=28, circ=2*Math.PI*r;
    document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon" style="background:rgba(124,58,237,0.15);color:var(--purple)">◈</div>
        <span class="stat-trend" style="background:rgba(124,58,237,0.15);color:var(--purple)">${pct}%</span>
      </div>
      <div class="stat-num">${total}</div>
      <div class="stat-label">TOTAAL TAKEN</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--c1),var(--c2))"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon" style="background:var(--green-d);color:var(--green)">✓</div>
        <span class="stat-trend" style="background:var(--green-d);color:var(--green)">+${done}</span>
      </div>
      <div class="stat-num" style="color:var(--green)">${done}</div>
      <div class="stat-label">VOLTOOID</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${total?done/total*100:0}%;background:linear-gradient(90deg,var(--green),var(--blue))"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon" style="background:var(--red-d);color:var(--red)">⚑</div>
        <span class="stat-trend" style="background:var(--red-d);color:var(--red)">urgent</span>
      </div>
      <div class="stat-num" style="color:var(--red)">${high}</div>
      <div class="stat-label">HOGE PRIORITEIT</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${total?high/total*100:0}%;background:linear-gradient(90deg,var(--red),var(--amber))"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-top">
        <div class="pring-wrap">
          <div class="pring">
            <svg width="40" height="40" viewBox="0 0 64 64"><circle class="pring-bg" cx="32" cy="32" r="${r}"/><circle class="pring-fill" cx="32" cy="32" r="${r}" stroke="url(#pg)" stroke-dasharray="${circ}" stroke-dashoffset="${circ-(circ*pct/100)}"/><defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs></svg>
            <div class="pring-txt">${pct}%</div>
          </div>
        </div>
      </div>
      <div class="stat-num" style="color:var(--amber)">${state.tasks.filter(x=>x.repeat).length}</div>
      <div class="stat-label">HERHALEND</div>
    </div>`;
  }

  // ─── Charts ───────────────────────────────────────────────────────────────────
  function renderCharts(){
    const days=['Ma','Di','Wo','Do','Vr','Za','Zo'];
    const vals=[3,5,2,7,4,6,state.tasks.filter(x=>x.done).length||2];
    const max=Math.max(...vals)||1;
    document.getElementById('week-label').textContent='deze week';
    document.getElementById('week-chart').innerHTML=`<div class="bar-chart">${vals.map((v,i)=>`
    <div class="bar-col">
      <div class="bar-fill ${i===6?'done-bar':''}" style="height:${Math.round(v/max*60)+10}px" title="${v} taken"></div>
      <div class="bar-lbl">${days[i]}</div>
    </div>`).join('')}</div>`;

    const done=state.tasks.filter(x=>x.done).length, total=state.tasks.length, left=total-done;
    const pct=total?Math.round(done/total*100):0;
    const r=28,circ=2*Math.PI*r;
    document.getElementById('donut-row').innerHTML=`
    <div class="donut-wrap">
      <svg width="70" height="70" viewBox="0 0 64 64">
        <circle fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8" cx="32" cy="32" r="${r}"/>
        <circle fill="none" stroke="url(#dg)" stroke-width="8" stroke-linecap="round" cx="32" cy="32" r="${r}"
          stroke-dasharray="${circ}" stroke-dashoffset="${circ-(circ*pct/100)}" transform="rotate(-90 32 32)"/>
        <defs><linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient></defs>
      </svg>
      <div class="donut-center"><div class="donut-pct">${pct}%</div><div class="donut-sub2">gedaan</div></div>
    </div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>${done} voltooid</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--purple)"></div>${left} actief</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--amber)"></div>${state.tasks.filter(x=>x.priority==='high'&&!x.done).length} urgent</div>
    </div>`;

    // heatmap
    const cells=Array.from({length:30},(_,i)=>{
      const cls=state.tasks.filter(x=>x.done).length>i?['hm1','hm2','hm3'][Math.floor(Math.random()*3)]:'';
      return `<div class="hm-cell ${cls}" title="Dag ${i+1}"></div>`;
    });
    document.getElementById('heatmap').innerHTML=cells.join('');
  }

  // ─── Task render ──────────────────────────────────────────────────────────────
  function render(){
    renderSidebar(); renderStats(); renderCharts();
    const list=getFiltered();
    const active=list.filter(x=>!x.done), done=list.filter(x=>x.done);
    const col=document.getElementById('task-col');
    let html=`<div class="chip-row">
    <button class="chip active" onclick="filterChip('all',this)">Alles</button>
    <button class="chip" onclick="filterChip('high',this)">🔴 Hoog</button>
    <button class="chip" onclick="filterChip('medium',this)">🟡 Middel</button>
    <button class="chip" onclick="filterChip('low',this)">🟢 Laag</button>
    ${state.projects.map(p=>`<button class="chip" onclick="filterChip('proj-${p.id}',this)"><span style="color:${p.color}">●</span> ${esc(p.name)}</button>`).join('')}
  </div>`;
    if(!list.length){html+=`<div class="empty"><div class="empty-icon">◈</div>Geen taken gevonden</div>`;col.innerHTML=html;return;}
    if(active.length){
      html+=`<div class="section-head"><span class="section-title">Actief</span><div class="section-line"></div><span class="section-count">${active.length}</span></div>`;
      html+=`<div class="task-stack">${active.map(taskHTML).join('')}</div>`;
    }
    if(done.length){
      html+=`<div class="section-head" style="margin-top:1rem"><span class="section-title">Voltooid</span><div class="section-line"></div><span class="section-count">${done.length}</span></div>`;
      html+=`<div class="task-stack">${done.map(taskHTML).join('')}</div>`;
    }
    col.innerHTML=html;
  }

  function taskHTML(t){
    const proj=state.projects.find(p=>p.id===t.projectId);
    const overdue=t.date&&t.date<today()&&!t.done;
    const subDone=t.subtasks.filter(s=>s.done).length, subTotal=t.subtasks.length;
    const subPct=subTotal?Math.round(subDone/subTotal*100):0;
    return `<div class="task-card pri-${t.priority}${t.done?' done-task':''}">
    <button class="task-check-btn" onclick="toggleDone(${t.id})">
      <svg class="check-svg" width="10" height="10" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div class="task-body">
      <div class="task-title">${esc(t.title)}</div>
      <div class="task-meta">
        <span class="tag t-${t.priority==='high'?'high':t.priority==='medium'?'med':'low'}">${t.priority}</span>
        ${proj?`<span class="tag t-cat" style="color:${proj.color}">● ${esc(proj.name)}</span>`:''}
        ${t.repeat?`<span class="tag t-rep">↻ ${t.repeat==='daily'?'dagelijks':'wekelijks'}</span>`:''}
        ${t.date?`<span class="t-date${overdue?' overdue':''}">${overdue?'⚑ ':''}${fmtDate(t.date)}</span>`:''}
      </div>
      ${subTotal?`
      <div style="margin-top:0.4rem">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="sub-progbar" style="flex:1"><div class="sub-progbar-fill" style="width:${subPct}%"></div></div>
          <span class="sub-prog">${subDone}/${subTotal}</span>
        </div>
        <button class="expand-btn" onclick="toggleSubs(${t.id})">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4l4 4 4-4"/></svg>
          subtaken
        </button>
        <div id="subs-${t.id}" class="subtask-list" style="display:none">
          ${t.subtasks.map(s=>`<div class="subtask-item">
            <button class="sub-check${s.done?' done-sub':''}" onclick="toggleSub(${t.id},${s.id})">
              ${s.done?`<svg width="8" height="8" viewBox="0 0 10 10"><path d="M1.5 5l2.5 2.5 5-5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`:''}
            </button>
            <span class="sub-title${s.done?' done-sub-txt':''}">${esc(s.title)}</span>
          </div>`).join('')}
          <div style="display:flex;gap:0.4rem;margin-top:0.3rem">
            <input style="font-size:0.75rem;padding:2px 7px;background:var(--glass2);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;flex:1;font-family:var(--sans)" placeholder="Subtaak toevoegen…" id="newsub-${t.id}" onkeydown="if(event.key==='Enter')addSub(${t.id})"/>
            <button onclick="addSub(${t.id})" style="font-size:0.72rem;padding:2px 9px;background:var(--glass2);border:1px solid var(--border);border-radius:6px;color:var(--purple);cursor:pointer;font-family:var(--sans)">+</button>
          </div>
        </div>
      </div>`:
            `<div style="margin-top:0.35rem">
        <button class="expand-btn" onclick="quickAddSub(${t.id})">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="5"/><path d="M6 3v6M3 6h6"/></svg>
          subtaak
        </button>
        <div id="subs-${t.id}" class="subtask-list" style="display:none">
          <div style="display:flex;gap:0.4rem">
            <input style="font-size:0.75rem;padding:2px 7px;background:var(--glass2);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;flex:1;font-family:var(--sans)" placeholder="Subtaak toevoegen…" id="newsub-${t.id}" onkeydown="if(event.key==='Enter')addSub(${t.id})"/>
            <button onclick="addSub(${t.id})" style="font-size:0.72rem;padding:2px 9px;background:var(--glass2);border:1px solid var(--border);border-radius:6px;color:var(--purple);cursor:pointer;font-family:var(--sans)">+</button>
          </div>
        </div>
      </div>`}
    </div>
    <div class="task-right">
      <div class="task-acts">
        <button class="iBtn" onclick="openEdit(${t.id})" title="Bewerken">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11.5 2.5a2 2 0 0 1 2 2L5 13l-3 .5.5-3L11.5 2.5z"/></svg>
        </button>
        <button class="iBtn del" onclick="deleteTask(${t.id})" title="Verwijderen">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 10h8l1-10"/></svg>
        </button>
      </div>
    </div>
  </div>`;
  }

  // ─── Task actions ─────────────────────────────────────────────────────────────
  function toggleDone(id){ const t=state.tasks.find(x=>x.id===id); if(t){t.done=!t.done;save();render()} }
  function deleteTask(id){ state.tasks=state.tasks.filter(x=>x.id!==id); save(); render() }
  function toggleSubs(id){ const el=document.getElementById('subs-'+id); if(el)el.style.display=el.style.display==='none'?'flex':'none'; el.style.flexDirection='column' }
  function quickAddSub(id){ const el=document.getElementById('subs-'+id); if(el){el.style.display='flex';el.style.flexDirection='column';} const inp=document.getElementById('newsub-'+id); if(inp)inp.focus(); }
  function addSub(taskId){
    const inp=document.getElementById('newsub-'+taskId); if(!inp) return;
    const val=inp.value.trim(); if(!val) return;
    const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
    t.subtasks.push({id:Date.now(),title:val,done:false});
    inp.value=''; save(); render();
    setTimeout(()=>{const el=document.getElementById('subs-'+taskId);if(el){el.style.display='flex';el.style.flexDirection='column';}},50);
  }
  function toggleSub(taskId,subId){
    const t=state.tasks.find(x=>x.id===taskId); if(!t) return;
    const s=t.subtasks.find(x=>x.id===subId); if(s){s.done=!s.done;save();render();}
    setTimeout(()=>{const el=document.getElementById('subs-'+taskId);if(el){el.style.display='flex';el.style.flexDirection='column';}},50);
  }

  // ─── Add form ─────────────────────────────────────────────────────────────────
  function toggleAddForm(){
    showAddForm=!showAddForm;
    const wrap=document.getElementById('add-form-wrap');
    wrap.style.display=showAddForm?'block':'none';
    if(showAddForm) wrap.innerHTML=buildAddForm();
  }

  function buildAddForm(){
    return `<div class="add-form">
    <div class="form-title">Nieuwe taak</div>
    <div class="form-grid">
      <input class="f-inp full" id="f-title" type="text" placeholder="Taaknaam…" />
      <select class="f-inp" id="f-pri">
        <option value="medium">Middel</option>
        <option value="high">Hoog</option>
        <option value="low">Laag</option>
      </select>
      <select class="f-inp" id="f-proj">
        ${state.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}
      </select>
      <input class="f-inp" id="f-date" type="date"/>
      <select class="f-inp" id="f-rep">
        <option value="">Geen herhaling</option>
        <option value="daily">Dagelijks</option>
        <option value="weekly">Wekelijks</option>
      </select>
      <input class="f-inp" id="f-note" type="text" placeholder="Notitie (optioneel)…"/>
    </div>
    <div class="form-acts">
      <button class="top-btn" onclick="toggleAddForm()">Annuleer</button>
      <button class="top-btn primary" onclick="addTask()">Opslaan</button>
    </div>
  </div>`;
  }

  function addTask(){
    const title=document.getElementById('f-title')?.value.trim();
    if(!title){document.getElementById('f-title').style.borderColor='var(--red)';return;}
    state.tasks.unshift({
      id:Date.now(), title,
      priority:document.getElementById('f-pri').value,
      projectId:document.getElementById('f-proj').value,
      date:document.getElementById('f-date').value,
      repeat:document.getElementById('f-rep').value||null,
      note:document.getElementById('f-note').value.trim(),
      subtasks:[], done:false, created:Date.now()
    });
    save(); toggleAddForm(); render();
  }

  // ─── Edit modal ───────────────────────────────────────────────────────────────
  function openEdit(id){
    editId=id; const t=state.tasks.find(x=>x.id===id);
    document.getElementById('modal-inner').innerHTML=`
    <div class="modal-head">
      <div class="modal-title">Taak bewerken</div>
      <button class="iBtn del" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <input class="f-inp full" id="e-title" type="text" value="${esc(t.title)}" />
      <select class="f-inp" id="e-pri">
        ${['high','medium','low'].map(v=>`<option value="${v}"${t.priority===v?' selected':''}>${v}</option>`).join('')}
      </select>
      <select class="f-inp" id="e-proj">
        ${state.projects.map(p=>`<option value="${p.id}"${t.projectId===p.id?' selected':''}>${esc(p.name)}</option>`).join('')}
      </select>
      <input class="f-inp" id="e-date" type="date" value="${t.date||''}"/>
      <select class="f-inp" id="e-rep">
        <option value="">Geen</option>
        <option value="daily"${t.repeat==='daily'?' selected':''}>Dagelijks</option>
        <option value="weekly"${t.repeat==='weekly'?' selected':''}>Wekelijks</option>
      </select>
      <input class="f-inp" id="e-note" type="text" value="${esc(t.note||'')}" placeholder="Notitie…"/>
    </div>
    <div class="form-acts">
      <button class="top-btn" onclick="closeModal()">Annuleer</button>
      <button class="top-btn primary" onclick="saveEdit()">Opslaan</button>
    </div>`;
    document.getElementById('modal').style.display='flex';
  }
  function saveEdit(){
    const t=state.tasks.find(x=>x.id===editId); if(!t) return;
    t.title=document.getElementById('e-title').value.trim()||t.title;
    t.priority=document.getElementById('e-pri').value;
    t.projectId=document.getElementById('e-proj').value;
    t.date=document.getElementById('e-date').value;
    t.repeat=document.getElementById('e-rep').value||null;
    t.note=document.getElementById('e-note').value.trim();
    save(); closeModal(); render();
  }
  function closeModal(){ document.getElementById('modal').style.display='none'; editId=null; }

  // ─── New project ──────────────────────────────────────────────────────────────
  function openNewProject(){
    document.getElementById('modal-inner').innerHTML=`
    <div class="modal-head"><div class="modal-title">Nieuw project</div><button class="iBtn del" onclick="closeModal()">✕</button></div>
    <div class="form-grid">
      <input class="f-inp full" id="pn" type="text" placeholder="Projectnaam…"/>
    </div>
    <div style="margin:0.65rem 0 0.85rem">
      <div style="font-size:0.75rem;color:var(--text3);margin-bottom:0.5rem">Kleur</div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
        ${PROJ_COLORS.map((c,i)=>`<div onclick="selProjColor('${c}')" id="pc-${c.replace('#','')}" style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${i===0?'white':'transparent'};transition:border 0.15s"></div>`).join('')}
      </div>
    </div>
    <div class="form-acts">
      <button class="top-btn" onclick="closeModal()">Annuleer</button>
      <button class="top-btn primary" onclick="saveProject()">Aanmaken</button>
    </div>`;
    window._selProjColor=PROJ_COLORS[0];
    document.getElementById('modal').style.display='flex';
  }
  function selProjColor(c){
    window._selProjColor=c;
    PROJ_COLORS.forEach(col=>{
      const el=document.getElementById('pc-'+col.replace('#',''));
      if(el) el.style.border=col===c?'2px solid white':'2px solid transparent';
    });
  }
  function saveProject(){
    const name=document.getElementById('pn')?.value.trim(); if(!name) return;
    state.projects.push({id:'p'+Date.now(),name,color:window._selProjColor||PROJ_COLORS[0]});
    save(); closeModal(); render();
  }

  // ─── Chip filter ──────────────────────────────────────────────────────────────
  let chipFilter='all';
  function filterChip(f,btn){
    chipFilter=f;
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    if(btn) btn.classList.add('active');
    render();
  }

  // ─── AI ───────────────────────────────────────────────────────────────────────
  let activeTab='tip';
  function switchAITab(tab, btn){
    activeTab=tab;
    document.querySelectorAll('.ai-tab').forEach(t=>t.classList.remove('active'));
    if(btn) btn.classList.add('active');
    const placeholders={tip:'Stel een vraag…',goal:'Voer een doel in, bijv. "gezonder leven"',prio:'Vraag om prioritering…'};
    document.getElementById('ai-inp').placeholder=placeholders[tab]||'Stel een vraag…';
    if(tab==='tip') runAI('tip','');
    else if(tab==='prio') runAI('prio','');
    else document.getElementById('ai-body').innerHTML=`<div class="ai-text" style="color:var(--text3)">Typ een doel en druk op → om taken te genereren</div>`;
  }

  function openAI(mode){
    if(mode==='plan') runAI('plan','');
    else if(mode==='summary') runAI('summary','');
    document.getElementById('ai-panel').scrollIntoView({behavior:'smooth',block:'center'});
  }

  function sendAI(){
    const val=document.getElementById('ai-inp').value.trim();
    document.getElementById('ai-inp').value='';
    runAI(activeTab, val);
  }

  async function runAI(mode, userMsg){
    const body=document.getElementById('ai-body');
    body.innerHTML=`<div class="ai-loading"><div class="dot3"><i></i><i></i><i></i></div> Bezig…</div>`;
    const taskSummary=state.tasks.slice(0,12).map(t=>`[${t.done?'klaar':'open'}] ${t.priority} | ${state.projects.find(p=>p.id===t.projectId)?.name||'?'} | ${t.title}${t.date?' ('+fmtDate(t.date)+')':''}`).join('\n')||'Geen taken.';

    const prompts={
      tip:{sys:'Je bent een compacte productiviteitscoach in een taak-app. Geef één specifieke, actionable tip in 2-3 zinnen op basis van de taken. In het Nederlands.',user:`Mijn taken:\n${taskSummary}\n${userMsg?'Vraag: '+userMsg:''}`},
      goal:{sys:'Je bent een AI taakplanner. De gebruiker geeft een doel. Genereer 4-6 concrete, haalbare subtaken als een to-do lijst. Gebruik markdown bullet points. In het Nederlands. Houd het kort en praktisch.',user:`Doel: ${userMsg||'gezonder leven'}\nGenereer concrete taken.`},
      prio:{sys:'Je bent een prioriteringsexpert. Analyseer de taken en geef aan welke de gebruiker als eerste moet aanpakken en waarom. Max 3 zinnen + een top-3 lijst. In het Nederlands.',user:`Taken:\n${taskSummary}\n${userMsg?'Vraag: '+userMsg:''}`},
      plan:{sys:'Je bent een dagplanner AI. Maak een realistische dagplanning op basis van de open taken van vandaag. Gebruik tijdblokken. In het Nederlands.',user:`Open taken van vandaag:\n${state.tasks.filter(x=>!x.done&&x.date===today()).map(t=>t.title).join('\n')||'Geen taken vandaag'}`},
      summary:{sys:'Je bent een productiviteitsassistent. Geef een korte samenvatting van de voortgang, wat goed gaat en wat aandacht nodig heeft. Max 4 zinnen. In het Nederlands.',user:`Taken:\n${taskSummary}`},
      chat:{sys:'Je bent een behulpzame AI assistent in een taak-app. Beantwoord vragen over productiviteit en taken. In het Nederlands. Houd antwoorden kort.',user:`Taken:\n${taskSummary}\nVraag: ${userMsg}`}
    };

    const cfg=prompts[mode]||prompts.chat;
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:cfg.sys,messages:[{role:'user',content:cfg.user}]})
      });
      const data=await r.json();
      const txt=(data.content||[]).map(b=>b.text||'').join('');
      body.innerHTML=`<div class="ai-text">${txt.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>').replace(/- /g,'• ')}</div>`;
    }catch(e){
      body.innerHTML=`<div class="ai-text" style="color:var(--red)">AI niet bereikbaar. Controleer verbinding.</div>`;
    }
  }

  // ─── Init ─────────────────────────────────────────────────────────────────────
  seed(); render();
</script>
</body>
</html>
